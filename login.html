<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/login.css">
    <link rel="shortcut icon" href="caminho/do/seu-icone.png" type="image/x-icon">
</head>

<body>

    <div id="login">
        <form class="form">
            <div class="logo">
                <img src="/imag/Cantina_Carvalha.png" alt="Logo">
            </div>
            <div class="form-container">

                <label for="email">E-mail</label>
                <div class="email-icone">
                    <input type="email" id="email" placeholder="Seu e-mail" required>
                </div>

                <label for="senha">Senha</label>
                <div class="nome">
                    <input type="password" id="senha" placeholder="Senha" required>
                </div>

            </div>

            <a id="link" href="">Esqueceu a sua senha?</a>
            <a id="link" href="">Ainda não tem conta?</a>

            <div class="btn-container">
                <button id="button">ENTRAR</button>
            </div>

        </form>

    </div>

</body>

</html>
