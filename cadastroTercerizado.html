<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Tercerizado</title>
    <link rel="stylesheet" href="/cadastroTercerizado.css">
    <link rel="shortcut icon" href="caminho/do/seu-icone.png" type="image/x-icon">
</head>

<body>
    <div id="login">
        <form class="form">
            <div class="logo">
                <img src="/img/Captura_de_tela_2026-03-31_082739-removebg-preview.png" alt="Logo">
            </div>
            <div class="form-container">
                <label for="nome">Nome:</label>
                <div class="nome">
                    <input type="text" id="nome" placeholder="Seu Nome" required>
                </div>

                <label for="email">E-mail:</label>
                <div class="email-icone">
                    <input type="email" id="email" placeholder="Seu e-mail" required>
                </div>

                <label for="senha">Senha:</label>
                <div class="nome">
                    <input type="password" id="senha" placeholder="Senha" required>
                </div>

                <label for="nome">Confirme a senha:</label>
                <div class="Confirme_senha ">
                    <input type="password" id="Confirme_senha" placeholder="Confirme a sua senha" required>
                </div>

            </div>

            <div class="btn-container">
                <button id="button">CADASTRAR</button>
            </div>

            <a id="link" href="">Já possui uma conta?</a>

        </form>

    </div>

</body>

</html>
