<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" href="caminho/do/seu-icone.png" type="image/x-icon">

<body>

    <div id="login">
        <form class="form">
            <div class="form-container">
                <label for="nome">Nome</label>
                <div class="nome">
                    <input type="text" id="nome" placeholder="Seu Nome" required>
                </div>

                <label for="email">E-mail</label>
                <div class="email-icone"> 
                    <input type="email" id="email" placeholder="Seu e-mail" required > 
                </div>

                <label for="senha">Senha</label>
                <div class="nome">
                    <input type="password" id="senha" placeholder="Senha" required>
                </div>

                <label for="nome">Confirme Senha</label>
                <div class="Confirme_senha ">
                    <input type="password" id="Confirme_senha" placeholder="Confirme a sua senha" required>
                </div>

            </div>

            <div class="btn-container">
                <button id="button">CADASTRAR</button>
            </div>

            <a  id="link" href="">Você é funcionário da escola?</a>

        </form>

    </div>

</body>

</html>
